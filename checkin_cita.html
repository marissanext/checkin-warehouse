<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-In Warehouse</title>
<style>
:root{--bg:#0a0f0d;--surface:#111a15;--card:#162019;--border:#1e3326;--accent:#00e87a;--accent-dim:#00e87a22;--accent-mid:#00e87a55;--warn:#ffb830;--warn-dim:#ffb83022;--text:#e8f5ee;--muted:#5a7a65;--danger:#ff4d4d}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:40px}
.header{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px}
.header-icon{width:36px;height:36px;background:var(--accent-dim);border:1px solid var(--accent-mid);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.ht{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.hs{font-size:11px;color:var(--muted);opacity:.6;margin-top:2px}
.status-bar{width:100%;max-width:420px;margin:20px auto 0;padding:0 20px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.badge.p{background:var(--warn-dim);border:1px solid var(--warn);color:var(--warn)}
.badge.c{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.folio{width:100%;max-width:420px;padding:16px 20px 0;margin:0 auto}
.fn{font-size:32px;font-weight:600;color:var(--text);letter-spacing:-.02em;line-height:1}
.fl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.cards{width:100%;max-width:420px;padding:20px 20px 0;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.cl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.cv{font-size:18px;font-weight:600;color:var(--text);line-height:1.2}
.cv.a{color:var(--accent)}
.cr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ci{font-size:20px;margin-bottom:8px;display:block}
.divider{width:100%;max-width:420px;margin:20px auto 0;padding:0 20px;display:flex;align-items:center;gap:12px}
.dl{flex:1;height:1px;background:var(--border)}
.dt{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.actions{width:100%;max-width:420px;padding:20px 20px 0;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.btn-ci{width:100%;padding:18px;background:var(--accent);color:#050f08;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.btn-ci:disabled{background:var(--accent-mid);color:var(--bg);cursor:not-allowed}
.btn-rep{width:100%;padding:14px;background:transparent;color:var(--danger);border:1px solid #ff4d4d44;border-radius:12px;font-size:14px;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:40px;text-align:center}
.overlay.show{display:flex;animation:fi .4s ease}
@keyframes fi{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.oi{width:80px;height:80px;background:var(--accent-dim);border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:24px}
.ot{font-size:24px;font-weight:600;color:var(--accent);margin-bottom:8px}
.os{font-size:14px;color:var(--muted);margin-bottom:32px;line-height:1.6}
.oti{font-size:13px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 20px}
.footer{width:100%;max-width:420px;margin:28px auto 0;padding:0 20px;text-align:center;font-size:11px;color:var(--muted);opacity:.5}
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">&#127981;</div>
  <div><div class="ht">Tablero Operativo &mdash; Warehouse</div><div class="hs">Portal de Check-In</div></div>
</div>
<div id="root"></div>
<div class="overlay" id="ok">
  <div class="oi">&#10003;</div>
  <div class="ot">Check-In Registrado</div>
  <div class="os" id="ok-msg"></div>
  <div class="oti" id="ok-time"></div>
</div>
<script>
var p = new URLSearchParams(window.location.search);
var po = p.get('po') || p.get('cita') || '';
var tr = p.get('transportista') || '';
var pl = p.get('placas') || '';
var dk = p.get('dock') || '';
var fe = p.get('fecha') || '';
var ve = p.get('ventana') || '';
var st = p.get('estado') || 'Programada';
var root = document.getElementById('root');

if (!po) {
  root.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--muted)"><div style="font-size:48px;margin-bottom:16px">&#128241;</div><div style="font-size:20px;font-weight:600;margin-bottom:8px">Escanea el QR de la cita</div><div style="font-size:13px;opacity:.6">Esta pagina se abre al escanear el QR del Tablero Operativo.</div></div>';
} else {
  var bc = st.toLowerCase().indexOf('check') >= 0 ? 'c' : 'p';
  var html = '<div class="status-bar"><span class="badge ' + bc + '"><span class="dot"></span>' + st + '</span></div>';
  html += '<div class="folio"><div class="fl">Numero de cita</div><div class="fn">' + po + '</div></div>';
  html += '<div class="cards">';
  if (tr) html += '<div class="card"><span class="ci">&#128667;</span><div class="cl">Transportista</div><div class="cv">' + tr + '</div></div>';
  html += '<div class="cr">';
  if (dk) html += '<div class="card"><span class="ci">&#127981;</span><div class="cl">Dock</div><div class="cv a">' + dk + '</div></div>';
  if (ve) html += '<div class="card"><span class="ci">&#9200;</span><div class="cl">Horario</div><div class="cv">' + ve + '</div></div>';
  html += '</div><div class="cr">';
  if (fe) html += '<div class="card"><span class="ci">&#128197;</span><div class="cl">Fecha</div><div class="cv">' + fe + '</div></div>';
  if (pl) html += '<div class="card"><span class="ci">&#128663;</span><div class="cl">Placas</div><div class="cv">' + pl + '</div></div>';
  html += '</div></div>';
  html += '<div class="divider"><div class="dl"></div><div class="dt">Accion del operador</div><div class="dl"></div></div>';
  html += '<div class="actions"><button class="btn-ci" id="btn" onclick="chk()">&#10003; &nbsp;Registrar Check-In</button>';
  html += '<button class="btn-rep" onclick="if(confirm(\'Reportar problema?\'))alert(\'Contacta al coordinador.\')">&#10007; &nbsp;Reportar problema</button></div>';
  html += '<div class="footer">Tablero Operativo &middot; ' + new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}) + '</div>';
  root.innerHTML = html;
}

function chk() {
  var btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Registrando...';
  setTimeout(function() {
    var now = new Date();
    var hora = now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    var dia = now.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
    document.getElementById('ok-msg').textContent = 'La cita ' + po + (tr ? ' - ' + tr : '') + ' registrada exitosamente.';
    document.getElementById('ok-time').textContent = 'Check-in: ' + dia + ' a las ' + hora;
    document.getElementById('ok').classList.add('show');
  }, 800);
}
</script>
</body>
</html>
